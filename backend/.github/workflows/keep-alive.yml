name: Keep Render service warm

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes — Render free tier sleeps after 15 min idle
  workflow_dispatch: {}       # allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf https://your-backend.onrender.com/health || echo "ping failed, service may be cold-starting"
